<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Go/No-Go Clínico</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #setup-screen, #result-screen {
            text-align: center;
            background: #222;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 600px;
            overflow-y: auto;
            max-height: 90vh;
        }
        #game-screen {
            display: none;
            font-size: 150px;
            font-weight: bold;
        }
        .green { color: #00ff00; }
        .red { color: #ff0000; }
        .white { color: #ffffff; }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background-color: #0056b3; }
        select {
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }
        th, td {
            border: 1px solid #444;
            padding: 8px;
            text-align: center;
        }
        th { background-color: #333; }
        .error-row { background-color: rgba(255, 0, 0, 0.2); }
        .stats-box {
            background: #333;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h2>Teste de Atenção e Impulsividade (Go/No-Go)</h2>
        <p>Aperte <strong>ESPAÇO</strong> o mais rápido possível quando ver o <strong>'O' VERDE</strong>.</p>
        <p><strong>NÃO APERTE NADA</strong> quando ver o <strong>'X' VERMELHO</strong>.</p>
        <label for="duration">Escolha a duração do teste:</label><br>
        <select id="duration">
            <option value="1">1 Minuto (Apenas para testar o app)</option>
            <option value="5">5 Minutos (Teste curto)</option>
            <option value="15" selected>15 Minutos (Padrão Clínico Recomendado)</option>
        </select><br>
        <button onclick="startTest()">Iniciar Teste</button>
    </div>

    <div id="game-screen"></div>

    <div id="result-screen" style="display: none;">
        <h2>Fim do Teste! Aqui estão seus resultados:</h2>
        <div id="summary" class="stats-box"></div>
        <button onclick="location.reload()">Fazer Novamente</button>
        <h3>Log Detalhado (Limpo e Organizado)</h3>
        <table id="results-table">
            <thead>
                <tr>
                    <th>Tentativa</th>
                    <th>Estímulo</th>
                    <th>Reação (ms)</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        let trials = [];
        let currentTrial = 0;
        let totalTrials = 0;
        let results = [];
        let stimulusTime;
        let timeoutId;
        let state = 'idle'; // idle, cross, stimulus
        let testActive = false;

        function startTest() {
            const minutes = parseInt(document.getElementById('duration').value);
            // Cada tentativa leva cerca de 2 segundos (1.5s max + 0.5s intervalo)
            // 15 minutos = 900 segundos = ~450 tentativas
            totalTrials = (minutes * 60) / 2; 

            // Gerar array de tentativas (80% GO, 20% NOGO)
            let goCount = Math.floor(totalTrials * 0.8);
            let nogoCount = totalTrials - goCount;
            
            for(let i=0; i<goCount; i++) trials.push('GO');
            for(let i=0; i<nogoCount; i++) trials.push('NOGO');
            
            // Embaralhar as tentativas aleatoriamente
            trials.sort(() => Math.random() - 0.5);

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            testActive = true;
            
            document.addEventListener('keydown', handleKeyPress);
            runNextTrial();
        }

        function runNextTrial() {
            if (currentTrial >= totalTrials || !testActive) {
                endTest();
                return;
            }

            let type = trials[currentTrial];
            let gameScreen = document.getElementById('game-screen');
            
            // Passo 1: Mostrar cruz de fixação
            state = 'cross';
            gameScreen.innerHTML = '<span class="white">+</span>';
            
            setTimeout(() => {
                // Passo 2: Mostrar Estímulo
                state = 'stimulus';
                stimulusTime = performance.now();
                
                if (type === 'GO') {
                    gameScreen.innerHTML = '<span class="green">O</span>';
                } else {
                    gameScreen.innerHTML = '<span class="red">X</span>';
                }

                // Esperar até 1500ms pela resposta
                timeoutId = setTimeout(() => {
                    if (state === 'stimulus') {
                        // Tempo esgotou sem apertar
                        recordResult(type, null);
                    }
                }, 1500);

            }, 500); // Fica 500ms na cruz
        }

        function handleKeyPress(event) {
            if (event.code === 'Space' && state === 'stimulus') {
                let reactionTime = performance.now() - stimulusTime;
                clearTimeout(timeoutId);
                recordResult(trials[currentTrial], Math.round(reactionTime));
            }
        }

        function recordResult(type, rt) {
            state = 'idle';
            document.getElementById('game-screen').innerHTML = ''; // Limpa a tela
            
            let status = 'Correto';
            let isError = false;

            if (type === 'GO' && rt === null) {
                status = 'ERRO: Omissão (Desatenção)';
                isError = true;
            } else if (type === 'NOGO' && rt !== null) {
                status = 'ERRO: Comissão (Impulsividade)';
                isError = true;
            }

            results.push({
                trialNumber: currentTrial + 1,
                type: type,
                rt: rt,
                status: status,
                isError: isError
            });

            currentTrial++;
            
            // Intervalo antes da próxima tentativa
            setTimeout(runNextTrial, 500);
        }

        function endTest() {
            testActive = false;
            document.removeEventListener('keydown', handleKeyPress);
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            processResults();
        }

        function processResults() {
            let omissionErrors = 0;
            let commissionErrors = 0;
            let goRTs = [];
            let tbody = document.querySelector('#results-table tbody');

            results.forEach(r => {
                // Calcular estatísticas
                if (r.type === 'GO' && r.rt === null) omissionErrors++;
                if (r.type === 'NOGO' && r.rt !== null) commissionErrors++;
                if (r.type === 'GO' && r.rt !== null) goRTs.push(r.rt);

                // Preencher Tabela
                let row = document.createElement('tr');
                if (r.isError) row.className = 'error-row';
                
                row.innerHTML = `
                    <td>${r.trialNumber}</td>
                    <td>${r.type}</td>
                    <td>${r.rt ? r.rt + ' ms' : '---'}</td>
                    <td>${r.status}</td>
                `;
                tbody.appendChild(row);
            });

            // Cálculos Avançados
            let avgRT = goRTs.length > 0 ? (goRTs.reduce((a, b) => a + b, 0) / goRTs.length).toFixed(0) : 0;
            
            let summaryDiv = document.getElementById('summary');
            summaryDiv.innerHTML = `
                <p><strong>Total de Tentativas:</strong> ${totalTrials}</p>
                <hr style="border-color:#555;">
                <p><strong>Erros de Omissão (Apagões de Atenção):</strong> ${omissionErrors}</p>
                <p><strong>Erros de Comissão (Impulsividade / Falha de Freio):</strong> ${commissionErrors}</p>
                <p><strong>Tempo de Reação Médio (Acertos GO):</strong> ${avgRT} ms</p>
            `;
        }
    </script>
</body>
</html>
