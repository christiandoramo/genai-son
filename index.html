<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Sinfonia Espacial - Phaser + Tone</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { margin: 0; background-color: #0d0d1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); }
        #start-ui { position: absolute; text-align: center; pointer-events: none; }
    </style>
</head>
<body>

    <div id="start-ui">
        <h2>SINFONIA ESPACIAL</h2>
        <p>Clique no jogo para iniciar a música.</p>
        <p>WASD para mover | ESPAÇO para impacto</p>
    </div>

    <div id="game-container"></div>

    <script>
        // --- 1. CONFIGURAÇÃO DO ÁUDIO (TONE.JS) ---
        let audioIniciado = false;
        
        // Efeitos globais
        const reverb = new Tone.Reverb({ decay: 4, wet: 0.5 }).toDestination();
        const filtro = new Tone.Filter(400, "lowpass").connect(reverb);

        // Sintetizador Base (Acordes suaves)
        const synthPad = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "triangle" },
            envelope: { attack: 2, decay: 1, sustain: 1, release: 3 }
        }).connect(filtro);
        synthPad.volume.value = -10;

        // Sintetizador Melódico (Arpejador plucky)
        const synthMelodia = new Tone.Synth({
            oscillator: { type: "sine" },
            envelope: { attack: 0.05, decay: 0.2, sustain: 0, release: 1 }
        }).connect(filtro);
        synthMelodia.volume.value = -5;

        // Bateria (Kick espacial)
        const kickDrum = new Tone.MembraneSynth({
            pitchDecay: 0.05,
            octaves: 4,
            oscillator: { type: "sine" },
            envelope: { attack: 0.001, decay: 0.4, sustain: 0.01, release: 1.4, attackCurve: "exponential" }
        }).connect(reverb);
        kickDrum.volume.value = -2;

        // --- 2. CONFIGURAÇÃO DO JOGO (PHASER) ---
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 800,
            parent: 'game-container',
            backgroundColor: '#0d0d1a',
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 0 }, drag: 0.05 }
            },
            scene: { preload, create, update }
        };

        const game = new Phaser.Game(config);
        let player;
        let cursors;
        let spaceKey;
        let particles;

        function preload() {
            // Criamos uma textura na hora, sem precisar baixar imagens
            let graphics = this.make.graphics({ x: 0, y: 0, add: false });
            graphics.fillStyle(0x00ffff, 1);
            graphics.fillRect(0, 0, 20, 20);
            graphics.generateTexture('box', 20, 20);

            let circle = this.make.graphics({ x: 0, y: 0, add: false });
            circle.fillStyle(0x00ffff, 0.5);
            circle.fillCircle(5, 5, 5);
            circle.generateTexture('trail', 10, 10);
        }

        function create() {
            player = this.physics.add.sprite(400, 400, 'box');
            player.setCollideWorldBounds(true);
            
            // Rastro visual
            particles = this.add.particles(0, 0, 'trail', {
                speed: 20,
                scale: { start: 1, end: 0 },
                alpha: { start: 0.5, end: 0 },
                lifespan: 800,
                blendMode: 'ADD'
            });
            particles.startFollow(player);

            cursors = this.input.keyboard.addKeys('W,A,S,D');
            spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

            // Iniciar Áudio ao Clicar (Regra dos navegadores modernos)
            this.input.on('pointerdown', async () => {
                if (!audioIniciado) {
                    await Tone.start();
                    document.getElementById('start-ui').style.display = 'none';
                    iniciarMusica();
                    audioIniciado = true;
                }
            });
        }

        function update() {
            if (!audioIniciado) return;

            // Movimentação Fluida
            const speed = 400;
            player.setVelocity(0);

            if (cursors.W.isDown) player.setVelocityY(-speed);
            if (cursors.S.isDown) player.setVelocityY(speed);
            if (cursors.A.isDown) player.setVelocityX(-speed);
            if (cursors.D.isDown) player.setVelocityX(speed);

            // Mapeando a posição X para o Filtro de Áudio (Abre e fecha o som)
            // Tela de 0 a 800px -> Frequência de 200Hz a 4000Hz
            const filterFreq = Phaser.Math.Linear(200, 4000, player.x / 800);
            filtro.frequency.rampTo(filterFreq, 0.1);

            // Impacto com Espaço
            if (Phaser.Input.Keyboard.JustDown(spaceKey)) {
                kickDrum.triggerAttackRelease("C1", "8n");
                
                // Efeito visual tremendo a câmera levemente
                this.cameras.main.shake(100, 0.01);
            }
        }

        // --- 3. O COMPOSITOR ALGORÍTMICO ---
        function iniciarMusica() {
            Tone.Transport.bpm.value = 90;

            // Sequência de Acordes (Lá Menor, Fá Maior, Dó Maior, Sol Maior)
            const acordes = [
                ["A3", "C4", "E4", "G4"],
                ["F3", "A3", "C4", "E4"],
                ["C3", "E3", "G3", "B3"],
                ["G3", "B3", "D4", "F#4"]
            ];
            let passoAcorde = 0;

            // Toca um acorde novo a cada compasso
            Tone.Transport.scheduleRepeat((time) => {
                synthPad.triggerAttackRelease(acordes[passoAcorde], "1m", time);
                passoAcorde = (passoAcorde + 1) % acordes.length;
            }, "1m");

            // Arpejador Aleatório Controlado pelo Y do Jogador
            const notasEscala = ["A4", "C5", "D5", "E5", "G5", "A5"];
            
            Tone.Transport.scheduleRepeat((time) => {
                // Se o jogador estiver na parte de cima da tela (Y menor), toca notas mais rápidas ou diferentes
                let probabilidade = Phaser.Math.Linear(0.8, 0.2, player.y / 800);
                
                if (Math.random() < probabilidade) {
                    let notaAleatoria = notasEscala[Math.floor(Math.random() * notasEscala.length)];
                    synthMelodia.triggerAttackRelease(notaAleatoria, "16n", time);
                }
            }, "8n");

            Tone.Transport.start();
        }
    </script>
</body>
</html>
